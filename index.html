<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>2026 KAM Individual Battle</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  margin: 0;
  padding: 0;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 60px auto;
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.subtitle {
  color: #ccc;
  margin-bottom: 40px;
}

/* Leaderboard */

.leaderboard {
  text-align: left;
  margin-top: 30px;
}

.rank-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.08);
  padding: 18px 25px;
  border-radius: 15px;
  margin-bottom: 15px;
  transform: translateY(30px);
  opacity: 0;
  animation: slideUp 0.6s forwards;
}

.rank-card:nth-child(1) { animation-delay: 0.2s; }
.rank-card:nth-child(2) { animation-delay: 0.4s; }
.rank-card:nth-child(3) { animation-delay: 0.6s; }
.rank-card:nth-child(4) { animation-delay: 0.8s; }
.rank-card:nth-child(5) { animation-delay: 1s; }

@keyframes slideUp {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.rank-left {
  display: flex;
  align-items: center;
}

.rank-number {
  font-size: 22px;
  font-weight: bold;
  width: 40px;
}

.player-icon {
  font-size: 40px;
  margin-right: 15px;
}

.player-name {
  font-size: 18px;
  font-weight: bold;
}

.badge {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: bold;
}

.winner-badge {
  background: gold;
  color: black;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from {
    box-shadow: 0 0 10px gold;
  }
  to {
    box-shadow: 0 0 25px gold;
  }
}

.normal-badge {
  background: rgba(255,255,255,0.2);
}

.footer-note {
  margin-top: 30px;
  color: #bbb;
}
</style>
</head>

<body>

<div class="container">

<h1>⚔️ Individual Battle</h1>
<div class="subtitle">KAM vs KAM — Mar'26 Ranking</div>

<div class="leaderboard">

  <!-- 1st -->
  <div class="rank-card">
    <div class="rank-left">
      <div class="rank-number">1</div>
      <div class="player-icon">🐑</div>
      <div class="player-name">Joshua</div>
    </div>
    <div class="badge winner-badge">🏆 Monthly Champion</div>
  </div>

  <!-- 2nd -->
  <div class="rank-card">
    <div class="rank-left">
      <div class="rank-number">2</div>
      <div class="player-icon">🐱</div>
      <div class="player-name">Elliyne</div>
    </div>
    <div class="badge normal-badge">Strong Performer</div>
  </div>

  <!-- 3rd -->
  <div class="rank-card">
    <div class="rank-left">
      <div class="rank-number">3</div>
      <div class="player-icon">🐯</div>
      <div class="player-name">Jayden</div>
    </div>
    <div class="badge normal-badge">Consistent Force</div>
  </div>

  <!-- 4th -->
  <div class="rank-card">
    <div class="rank-left">
      <div class="rank-number">4</div>
      <div class="player-icon">🦫</div>
      <div class="player-name">Swing</div>
    </div>
    <div class="badge normal-badge">Challenger</div>
  </div>

  <!-- 5th -->
  <div class="rank-card">
    <div class="rank-left">
      <div class="rank-number">5</div>
      <div class="player-icon">🐰</div>
      <div class="player-name">JY</div>
    </div>
    <div class="badge normal-badge">Rising Momentum</div>
  </div>
  
  <div class="footer-note">
🥇 #1 wins RM150 Vouchers!🎉| 🔄 #5 organizes monthly team activity😘
</div>

</div>

</body>
</html>
